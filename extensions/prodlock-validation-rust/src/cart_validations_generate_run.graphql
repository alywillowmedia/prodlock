query Input {
  shop {
    settingsMetafield: metafield(namespace: "prodlock", key: "settings") {
      value
    }
    visibilityMetafield: metafield(namespace: "prodlock", key: "visibility") {
      value
    }
  }
  cart {
    buyerIdentity {
      email
    }
    lines {
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
            handle
            title
            metafield(namespace: "$app", key: "locked") {
              value
            }
          }
        }
      }
    }
  }
}
